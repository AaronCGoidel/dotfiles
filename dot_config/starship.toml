# Starship — one-line, signal-only prompt

palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$rust\
$python\
$nodejs\
$lua\
$golang\
$cmd_duration\
$character"""

# No right prompt clutter
right_format = ""

# --- Modules ---

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "bold lavender"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
symbol = ""
style = "mauve"
format = " [$symbol $branch]($style)"

[git_status]
style = "maroon"
format = "[ $all_status$ahead_behind]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = ""
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
style = "yellow"
format = " [$duration]($style)"

# --- Languages (icon-only to stay compact) ---
[rust]
symbol = ""
format = " [$symbol]($style)"
style = "peach"

[python]
symbol = ""
format = " [$symbol]($style)"
style = "yellow"

[nodejs]
symbol = ""
format = " [$symbol]($style)"
style = "green"

[lua]
symbol = ""
format = " [$symbol]($style)"
style = "blue"

[golang]
symbol = ""
format = " [$symbol]($style)"
style = "teal"

# --- Disabled ---
[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[docker_context]
disabled = true

